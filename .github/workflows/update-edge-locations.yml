name: Update CloudFront Edge Locations

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch and compare edge locations
        id: fetch
        run: |
          set +e
          node scripts/update-edge-locations.mjs
          EXIT_CODE=$?
          set -e
          if [ "$EXIT_CODE" -eq 0 ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          elif [ "$EXIT_CODE" -eq 2 ]; then
            echo "No changes detected."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "Script failed with exit code $EXIT_CODE"
            exit 1
          fi

      - name: Check for existing PR
        if: steps.fetch.outputs.has_changes == 'true'
        id: existing_pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          EXISTING=$(gh pr list --head "auto/update-edge-locations" --state open --json number --jq '.[0].number // empty')
          if [ -n "$EXISTING" ]; then
            echo "pr_exists=true" >> "$GITHUB_OUTPUT"
            echo "pr_number=$EXISTING" >> "$GITHUB_OUTPUT"
            echo "Existing open PR: #$EXISTING"
          else
            echo "pr_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create branch and commit
        if: steps.fetch.outputs.has_changes == 'true'
        env:
          COMMIT_MSG: ${{ steps.fetch.outputs.title }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B auto/update-edge-locations
          git add public/static/cloudfront-edge-locations.json
          git commit -m "${COMMIT_MSG}"
          git push --force origin auto/update-edge-locations

      - name: Create or update PR
        if: steps.fetch.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_TITLE: ${{ steps.fetch.outputs.title }}
          PR_SUMMARY: ${{ steps.fetch.outputs.summary }}
        run: |
          read -r -d '' BODY <<ENDOFBODY || true
          ## CloudFront Edge Location Update

          ${PR_SUMMARY}

          ---
          *Auto-generated by the edge location update workflow.*
          ENDOFBODY

          if [ "${{ steps.existing_pr.outputs.pr_exists }}" = "true" ]; then
            gh pr edit "${{ steps.existing_pr.outputs.pr_number }}" \
              --title "${PR_TITLE}" \
              --body "${BODY}"
            echo "Updated existing PR #${{ steps.existing_pr.outputs.pr_number }}"
          else
            gh pr create \
              --head "auto/update-edge-locations" \
              --title "${PR_TITLE}" \
              --body "${BODY}"
          fi
